apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pharma-ui-ingress
  namespace: dev
  annotations:
    kubernetes.io/ingress.class: nginx  
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: "<DOMAIN_OR_LB>"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pharma-ui
                port:
                  number: 80
  tls:
    - hosts:
        - "<DOMAIN_OR_LB>"
      secretName: pharma-ui-tls